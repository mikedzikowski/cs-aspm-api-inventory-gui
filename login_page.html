<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASPM Service Inventory - Authentication</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 16px 32px rgba(1, 4, 9, 0.85);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo h1 {
            margin: 0;
            color: #58a6ff;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .logo p {
            margin: 8px 0 0 0;
            color: #8b949e;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #f0f6fc;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }
        .btn {
            width: 100%;
            background: #238636;
            color: white;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background: #2ea043;
        }
        .error {
            background: #da3633;
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .info {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 16px;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .info strong {
            color: #c9d1d9;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔍 ASPM Service Inventory</h1>
            <p>CrowdStrike ASPM API Authentication</p>
        </div>

        

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="client_id">Client ID</label>
                <input type="text" id="client_id" name="client_id" required
                       placeholder="Your CrowdStrike API Client ID" value="">
            </div>

            <div class="form-group">
                <label for="client_secret">Client Secret</label>
                <input type="password" id="client_secret" name="client_secret" required
                       placeholder="Your CrowdStrike API Client Secret">
            </div>

            <button type="submit" class="btn">🚀 Authenticate & Access Application</button>
        </form>

        <div class="info">
            <strong>About Authentication:</strong><br>
            This application uses your CrowdStrike ASPM API credentials to authenticate.
            Your credentials are validated against the CrowdStrike API and used to access
            live ASPM data. <strong>No credentials are stored permanently.</strong>
        </div>
    </div>
</body>
</html>
